<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 540" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace" font-size="12">
  <style>
    .label { font-weight: bold; font-size: 13px; fill: #fff; }
    .msg { font-size: 11px; }
    .note { font-size: 10.5px; fill: #93c5fd; font-style: italic; }
    .step { opacity: 0; }

    /* Looping animation: 12s total cycle, 1.5s pause at end */
    .s1  { animation: pop 12s 0.3s infinite; }
    .s2  { animation: pop 12s 1.1s infinite; }
    .s3  { animation: pop 12s 1.9s infinite; }
    .s4  { animation: pop 12s 2.7s infinite; }
    .s5  { animation: pop 12s 3.5s infinite; }
    .s6  { animation: pop 12s 4.3s infinite; }
    .s7  { animation: pop 12s 5.1s infinite; }
    .s8  { animation: pop 12s 5.9s infinite; }
    .s9  { animation: pop 12s 6.7s infinite; }
    .s10 { animation: pop 12s 7.5s infinite; }

    @keyframes pop {
      0%,2%    { opacity: 0; }
      3%,85%   { opacity: 1; }
      90%,100% { opacity: 0; }
    }

    /* Arrow drawing */
    .draw { stroke-dasharray: 250; stroke-dashoffset: 250; }
    .d1  { animation: dash 0.5s 0.3s infinite; animation-duration: 12s; }
    .d2  { animation: dash 0.5s 1.1s infinite; animation-duration: 12s; }
    .d4  { animation: dash 0.5s 2.7s infinite; animation-duration: 12s; }
    .d5  { animation: dash 0.5s 3.5s infinite; animation-duration: 12s; }
    .d6  { animation: dash 0.5s 4.3s infinite; animation-duration: 12s; }
    .d7  { animation: dash 0.5s 5.1s infinite; animation-duration: 12s; }
    .d8  { animation: dash 0.5s 5.9s infinite; animation-duration: 12s; }
    .d9  { animation: dash 0.5s 6.7s infinite; animation-duration: 12s; }
    .d10 { animation: dash 0.5s 7.5s infinite; animation-duration: 12s; }

    @keyframes dash {
      0%,2%    { stroke-dashoffset: 250; }
      5%,85%   { stroke-dashoffset: 0; }
      90%,100% { stroke-dashoffset: 250; }
    }

    /* Pulse on the check mark */
    .check { animation: pulse 12s 7.5s infinite; opacity: 0; }
    @keyframes pulse {
      0%,60%  { opacity: 0; transform: scale(1); }
      63%     { opacity: 1; transform: scale(1.3); }
      66%,85% { opacity: 1; transform: scale(1); }
      90%,100%{ opacity: 0; }
    }
  </style>

  <defs>
    <marker id="a-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#60a5fa"/>
    </marker>
    <marker id="a-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c084fc"/>
    </marker>
    <marker id="a-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#fb923c"/>
    </marker>
    <marker id="a-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#34d399"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1222"/>
      <stop offset="100%" stop-color="#1a2740"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="920" height="540" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="460" y="32" text-anchor="middle" fill="#f1f5f9" font-size="15" font-weight="bold">x402 Payment Protocol Flow</text>
  <text x="460" y="48" text-anchor="middle" fill="#475569" font-size="10">HTTP 402 · EIP-3009 · Gasless USDC</text>

  <!-- Column headers -->
  <rect x="55"  y="62" width="110" height="30" rx="6" fill="#3b82f6"/>
  <text x="110" y="82" text-anchor="middle" class="label">Client</text>

  <rect x="265" y="62" width="150" height="30" rx="6" fill="#7c3aed"/>
  <text x="340" y="82" text-anchor="middle" class="label">Resource Server</text>

  <rect x="505" y="62" width="120" height="30" rx="6" fill="#d97706"/>
  <text x="565" y="82" text-anchor="middle" class="label">Facilitator</text>

  <rect x="725" y="62" width="120" height="30" rx="6" fill="#059669"/>
  <text x="785" y="82" text-anchor="middle" class="label">Blockchain</text>

  <!-- Lifelines -->
  <line x1="110" y1="92" x2="110" y2="500" stroke="#1e3a5f" stroke-width="1.5" stroke-dasharray="5,5"/>
  <line x1="340" y1="92" x2="340" y2="500" stroke="#2d1b69" stroke-width="1.5" stroke-dasharray="5,5"/>
  <line x1="565" y1="92" x2="565" y2="500" stroke="#5c3d0e" stroke-width="1.5" stroke-dasharray="5,5"/>
  <line x1="785" y1="92" x2="785" y2="500" stroke="#0d4a3a" stroke-width="1.5" stroke-dasharray="5,5"/>

  <!-- ─── Step 1: GET /resource ─── -->
  <g class="step s1">
    <line x1="115" y1="130" x2="333" y2="130" stroke="#60a5fa" stroke-width="2" marker-end="url(#a-blue)" class="draw d1"/>
    <text x="224" y="124" text-anchor="middle" class="msg" fill="#60a5fa">GET /resource</text>
    <circle cx="28" cy="130" r="11" fill="#3b82f6"/>
    <text x="28" y="134" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">1</text>
  </g>

  <!-- ─── Step 2: 402 + payment requirements ─── -->
  <g class="step s2">
    <line x1="335" y1="168" x2="117" y2="168" stroke="#c084fc" stroke-width="2" marker-end="url(#a-purple)" class="draw d2"/>
    <text x="224" y="162" text-anchor="middle" class="msg" fill="#c084fc">402 Payment Required</text>
    <circle cx="28" cy="168" r="11" fill="#7c3aed"/>
    <text x="28" y="172" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">2</text>
  </g>

  <!-- ─── Step 3: Sign EIP-712 ─── -->
  <g class="step s3">
    <rect x="45" y="200" width="130" height="28" rx="5" fill="none" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="110" y="218" text-anchor="middle" class="note">Sign EIP-712 auth</text>
    <circle cx="28" cy="214" r="11" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="28" y="218" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="bold">3</text>
  </g>

  <!-- ─── Step 4: GET /resource + X-PAYMENT ─── -->
  <g class="step s4">
    <line x1="115" y1="260" x2="333" y2="260" stroke="#60a5fa" stroke-width="2" marker-end="url(#a-blue)" class="draw d4"/>
    <text x="224" y="254" text-anchor="middle" class="msg" fill="#60a5fa">GET /resource + X-PAYMENT</text>
    <circle cx="28" cy="260" r="11" fill="#3b82f6"/>
    <text x="28" y="264" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">4</text>
  </g>

  <!-- ─── Step 5: POST /settle ─── -->
  <g class="step s5">
    <line x1="345" y1="300" x2="558" y2="300" stroke="#fb923c" stroke-width="2" marker-end="url(#a-orange)" class="draw d5"/>
    <text x="452" y="294" text-anchor="middle" class="msg" fill="#fb923c">POST /settle</text>
    <circle cx="28" cy="300" r="11" fill="#d97706"/>
    <text x="28" y="304" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">5</text>
  </g>

  <!-- ─── Step 6: transferWithAuthorization ─── -->
  <g class="step s6">
    <line x1="570" y1="340" x2="778" y2="340" stroke="#34d399" stroke-width="2" marker-end="url(#a-green)" class="draw d6"/>
    <text x="674" y="334" text-anchor="middle" class="msg" fill="#34d399">transferWithAuthorization()</text>
    <circle cx="28" cy="340" r="11" fill="#059669"/>
    <text x="28" y="344" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">6</text>
  </g>

  <!-- ─── Step 7: tx receipt ─── -->
  <g class="step s7">
    <line x1="780" y1="378" x2="572" y2="378" stroke="#34d399" stroke-width="2" marker-end="url(#a-green)" class="draw d7"/>
    <text x="674" y="372" text-anchor="middle" class="msg" fill="#34d399">tx receipt</text>
    <circle cx="28" cy="378" r="11" fill="#059669"/>
    <text x="28" y="382" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">7</text>
  </g>

  <!-- ─── Step 8: success + txHash ─── -->
  <g class="step s8">
    <line x1="560" y1="416" x2="347" y2="416" stroke="#fb923c" stroke-width="2" marker-end="url(#a-orange)" class="draw d8"/>
    <text x="452" y="410" text-anchor="middle" class="msg" fill="#fb923c">{ success, txHash }</text>
    <circle cx="28" cy="416" r="11" fill="#d97706"/>
    <text x="28" y="420" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">8</text>
  </g>

  <!-- ─── Step 9: 200 + resource ─── -->
  <g class="step s9">
    <line x1="335" y1="454" x2="117" y2="454" stroke="#c084fc" stroke-width="2" marker-end="url(#a-purple)" class="draw d9"/>
    <text x="224" y="448" text-anchor="middle" class="msg" fill="#c084fc">200 OK + resource</text>
    <circle cx="28" cy="454" r="11" fill="#7c3aed"/>
    <text x="28" y="458" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">9</text>
  </g>

  <!-- ─── Step 10: Success check ─── -->
  <g class="step s10">
    <circle cx="110" cy="486" r="14" fill="#059669" filter="url(#glow)" class="check"/>
    <text x="110" y="491" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold" class="check">✓</text>
  </g>

  <!-- Footer -->
  <text x="460" y="526" text-anchor="middle" fill="#334155" font-size="10">x402.sperax.io — SperaxOS Payment Facilitator</text>

  <!-- Branding pill -->
  <rect x="380" y="505" width="160" height="18" rx="9" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
  <text x="460" y="517" text-anchor="middle" fill="#64748b" font-size="9">Powered by x402 Protocol</text>
</svg>
